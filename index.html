<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pancake Milkshake Deluxe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let bunnyImg, kittyImg, pancakeImg, shakeImg;
let score = 0;
let itemX, itemY;
let currentItem = "";
let isDragging = false;
let bunnySize = 150;
let kittySize = 150;
let gameState = "PLAY";

// --- REPLACE THESE WITH YOUR IMAGE LINKS ---
const BUNNY_URL = 'https://i.imgur.com/your-bunny-idle.png';
const KITTY_URL = 'https://i.imgur.com/your-kitty-idle.png';
const PANCAKE_URL = 'https://i.imgur.com/your-pancake.png';
const SHAKE_URL = 'https://i.imgur.com/your-shake.png';

function preload() {
  // If you don't have links yet, the game uses high-res placeholders
  bunnyImg = loadImage(BUNNY_URL, img => img, err => bunnyImg = null);
  kittyImg = loadImage(KITTY_URL, img => img, err => kittyImg = null);
  pancakeImg = loadImage(PANCAKE_URL, img => img, err => pancakeImg = null);
  shakeImg = loadImage(SHAKE_URL, img => img, err => shakeImg = null);
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  spawnItem();
  imageMode(CENTER);
}

function draw() {
  background("#fdf5e6");
  
  // Table Top
  fill("#e0c9a6"); noStroke();
  rect(0, height * 0.6, width, height * 0.4);

  if (gameState === "PLAY") {
    displayGame();
  } else if (gameState === "POP") {
    displayExplosion();
  }
}

function displayGame() {
  // Score
  fill("#6d4c41"); textSize(40); textAlign(CENTER);
  text("Score: " + score, width/2, 60);

  // Dragging logic
  if (isDragging) {
    itemX = lerp(itemX, mouseX, 0.3);
    itemY = lerp(itemY, mouseY, 0.3);
  }

  // Draw Bunny
  let bunnyBounce = (itemX < width/2 && isDragging) ? 1.2 : 1.0; 
  drawCharacter(bunnyImg, width * 0.2, height * 0.6, bunnySize * bunnyBounce, "Bunny");

  // Draw Kitty
  let kittyBounce = (itemX > width/2 && isDragging) ? 1.2 : 1.0;
  drawCharacter(kittyImg, width * 0.8, height * 0.6, kittySize * kittyBounce, "Kitty");

  // Draw Food
  drawFoodItem(itemX, itemY, currentItem);
  
  // Check for "Explosion" size
  if (bunnySize > 400 || kittySize > 400) gameState = "POP";
}

function drawCharacter(img, x, y, size, type) {
  if (img) {
    image(img, x, y, size, size);
  } else {
    // Better placeholder art if image fails
    fill(type === "Bunny" ? 255 : 200);
    stroke(0); strokeWeight(3);
    ellipse(x, y, size, size);
    fill(0); ellipse(x-size/4, y-10, 10, 10); ellipse(x+size/4, y-10, 10, 10);
  }
}

function drawFoodItem(x, y, type) {
  if (type === "pancake" && pancakeImg) image(pancakeImg, x, y, 100, 60);
  else if (type === "milkshake" && shakeImg) image(shakeImg, x, y, 70, 100);
  else {
    fill(type === "pancake" ? "orange" : "pink");
    rect(x-40, y-25, 80, 50, 10);
  }
}

function touchStarted() {
  if (gameState !== "PLAY") { resetGame(); return; }
  if (dist(mouseX, mouseY, itemX, itemY) < 100) isDragging = true;
  return false;
}

function touchEnded() {
  if (!isDragging) return;
  isDragging = false;

  if (itemX < width * 0.35) {
    if (currentItem === "pancake") { score++; bunnySize += 25; spawnItem(); }
    else { gameState = "POP"; }
  } else if (itemX > width * 0.65) {
    if (currentItem === "milkshake") { score++; kittySize += 25; spawnItem(); }
    else { gameState = "POP"; }
  } else {
    itemX = width/2; itemY = height/2;
  }
}

function spawnItem() {
  itemX = width / 2; itemY = height / 2;
  currentItem = random(["pancake", "milkshake"]);
}

function displayExplosion() {
  background(255, 50, 50);
  fill(255); textSize(60);
  text("BOOM!", width/2, height/2);
  textSize(20);
  text("They ate too much! Tap to restart.", width/2, height/2 + 60);
}

function resetGame() {
  score = 0; bunnySize = 150; kittySize = 150;
  gameState = "PLAY"; spawnItem();
}

function mousePressed() { touchStarted(); }
function mouseReleased() { touchEnded(); }
</script>
</body>
</html>
