<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pancake Milkshake</title>
    
    <link rel="apple-touch-icon" href="https://i.imgur.com/uRovA7G.png"> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #FFF1D6; 
            touch-action: none;
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        #hud-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            display: flex;
            justify-content: center;
        }

        .score-card {
            margin-top: calc(30px + env(safe-area-inset-top));
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.7) 100%);
            border: 4px solid #4A2E2B;
            border-radius: 24px;
            padding: 10px 50px;
            box-shadow: 0 10px 20px rgba(74, 46, 43, 0.1);
            pointer-events: auto;
            transform: scale(1);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 240px;
            height: 64px;
        }

        .score-card.pop-bump {
            transform: scale(1.25) !important;
        }

        #score-display-text {
            font-size: 32px;
            color: #4A2E2B;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1;
            margin: 0;
            text-align: center;
            width: 100%;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 241, 214, 0.85); 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(8px);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-card {
            background: #FFFFFF;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(74, 46, 43, 0.15);
            text-align: center;
            border: 4px solid #4A2E2B;
            width: 340px;
        }

        .overlay h1 {
            color: #E29A86;
            font-size: 44px;
            margin: 0 0 12px 0;
        }

        .overlay p {
            color: #4A2E2B;
            font-size: 18px;
        }

        .btn-restart {
            background: #E29A86;
            color: #FFFFFF;
            border: 3px solid #4A2E2B;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

<div id="hud-container">
    <div class="score-card" id="score-card-dom">
        <h1 id="score-display-text">SCORE: 0</h1>
    </div>
</div>

<div id="gameover-screen" class="overlay">
    <div class="overlay-card">
        <h1>BOOM!</h1>
        <p id="final-score-text">Final Score: 0</p>
        <button class="btn-restart" id="restart-button">Play Again</button>
    </div>
</div>

<script>
let score = 0;
let itemX, itemY, startY;
let currentItem = "";
let isDragging = false;
let bunnySize = 135;
let kittySize = 135;
let gameState = "PLAY"; 
let particles = [];

let bunnyX, kittyX;

let scoreTextNode, scoreBoxNode, gameoverScreen, finalScoreText, restartButton;

function setup() {
  createCanvas(windowWidth, windowHeight);
  updateLayout();
  
  scoreTextNode = document.getElementById('score-display-text');
  scoreBoxNode = document.getElementById('score-card-dom');
  gameoverScreen = document.getElementById('gameover-screen');
  finalScoreText = document.getElementById('final-score-text');
  
  restartButton = document.getElementById('restart-button');
  restartButton.addEventListener('click', resetGame);

  spawnItem();
}

/* LANDSCAPE FIX */
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    windowResized();
  }, 250);
});

function updateLayout() {
  startY = height * 0.70;
  if (width > height) {
    bunnyX = width * 0.25;
    kittyX = width * 0.75;
  } else {
    bunnyX = width * 0.22;
    kittyX = width * 0.78;
  }
}

function draw() {
  clear(); 

  if (gameState === "PLAY") {
    displayGame();
  } else {
    displayExplosion();
  }
}

function displayGame() {
  if (isDragging) {
    itemX = mouseX;
    itemY = mouseY;
  }

  let bunnyHungry = (isDragging && dist(itemX, itemY, bunnyX, startY) < (bunnySize * 1.1));
  let kittyHungry = (isDragging && dist(itemX, itemY, kittyX, startY) < (kittySize * 1.1));

  drawChibiBunny(bunnyX, startY, bunnySize, bunnyHungry);
  drawChibiKitty(kittyX, startY, kittySize, kittyHungry);

  drawFood(itemX, itemY, currentItem, true);
}
