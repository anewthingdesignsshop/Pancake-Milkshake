<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pancake Milkshake</title>
    
    */<link rel="apple-touch-icon" href="https://images.rawpixel.com/image_400/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIyLTA1L2pvYjcyOS0xMTUteC5qcGc.jpg"> */

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #fdf5e6; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
/** * GAME VARIABLES
 */
let score = 0;
let itemX, itemY, startY;
let currentItem = "";
let isDragging = false;
let bunnySize = 120;
let kittySize = 120;
let gameState = "PLAY"; 
let particles = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  startY = height * 0.6; 
  spawnItem();
}

function draw() {
  background("#fdf5e6");
  
  // 1. Draw Table/Environment
  noStroke();
  fill("#e0c9a6"); 
  rect(0, startY + 45, width, height - startY);
  stroke("#d7ccc8"); 
  strokeWeight(4); 
  line(0, startY + 45, width, startY + 45);

  if (gameState === "PLAY") {
    displayGame();
  } else {
    displayExplosion();
  }
}

function displayGame() {
  // Score UI - Scaled to screen width
  fill("#6d4c41"); noStroke(); textAlign(CENTER); textSize(width * 0.1);
  text(score, width / 2, height * 0.15);

  // Dragging logic
  if (isDragging) {
    itemX = mouseX;
    itemY = mouseY;
  }

  // Hunger Check
  let bunnyHungry = (isDragging && itemX < width * 0.45);
  let kittyHungry = (isDragging && itemX > width * 0.55);

  // Characters - Positions are relative to width so they move on rotation
  drawChibiBunny(width * 0.2, startY, bunnySize, bunnyHungry);
  drawChibiKitty(width * 0.8, startY, kittySize, kittyHungry);

  // Food Item
  drawFood(itemX, itemY, currentItem);
}

function drawChibiBunny(x, y, s, isOpen) {
  push();
  if (s > 300) translate(random(-2, 2), random(-2, 2)); 
  translate(x, y);
  
  fill(255); stroke(0); strokeWeight(3);
  ellipse(-s/4, -s/1.5, s/4, s/1.5); 
  ellipse(s/4, -s/1.5, s/4, s/1.5);
  ellipse(0, 0, s, s * 1.1);
  
  let dx = map(itemX, 0, width, -s/20, s/20);
  let dy = map(itemY, 0, height, -s/30, s/30);
  fill(0); noStroke();
  ellipse(-s/4 + dx, -s/10 + dy, s/10, s/8); 
  ellipse(s/4 + dx, -s/10 + dy, s/10, s/8);
  
  if (isOpen) {
    fill("#5d4037"); stroke(0);
    ellipse(0, s/6, s/3.5, s/2.5);
  } else {
    noFill(); stroke(0);
    arc(0, s/8, s/5, s/10, 0, PI);
  }
  pop();
}

function drawChibiKitty(x, y, s, isOpen) {
  push();
  if (s > 300) translate(random(-2, 2), random(-2, 2));
  translate(x, y);
  
  fill(220); stroke(0); strokeWeight(3);
  triangle(-s/2, -s/3, -s/4, -s/2, -s/8, -s/3);
  triangle(s/2, -s/3, s/4, -s/2, s/8, -s/3);
  ellipse(0, 0, s * 1.1, s);
  
  let dx = map(itemX, 0, width, -s/20, s/20);
  let dy = map(itemY, 0, height, -s/30, s/30);
  fill(0); noStroke();
  ellipse(-s/4 + dx, 0 + dy, s/10, s/8); 
  ellipse(s/4 + dx, 0 + dy, s/10, s/8);
  
  if (isOpen) {
    fill("#5d4037"); stroke(0);
    ellipse(0, s/6, s/2.5, s/3.5);
  } else {
    stroke(0); line(-s/10, s/8, s/10, s/8);
  }
  pop();
}

function drawFood(x, y, type) {
  push();
  translate(x, y);
  if (type === "pancake") {
    fill(240); noStroke(); ellipse(0, 15, 80, 25);
    fill("#f4d03f"); stroke(139, 69, 19, 100);
    for(let i=0; i<3; i++) ellipse(0, i*4, 65, 20);
    fill("#d35400"); noStroke(); ellipse(0, -5, 40, 10);
    fill("#ffeb3b"); stroke(255, 200, 0); rect(-8, -16, 16, 10, 2);
  } else {
    fill(255, 255, 255, 180); stroke(255);
    rect(-20, -40, 40, 70, 5);
    noStroke(); fill("#ffb6c1"); rect(-17, -35, 34, 60, 3);
    fill(255); ellipse(0, -40, 40, 20);
    fill("#e74c3c"); ellipse(0, -50, 12, 12);
    stroke("#e74c3c"); strokeWeight(4); line(8, -40, 15, -60);
  }
  pop();
}

function touchStarted() {
  if (gameState === "POP") { resetGame(); return false; }
  if (dist(mouseX, mouseY, itemX, itemY) < 100) isDragging = true;
  return false;
}

function touchEnded() {
  if (!isDragging) return false;
  isDragging = false;

  if (itemX < width * 0.35) {
    if (currentItem === "pancake") { score++; bunnySize += 35; spawnItem(); }
    else { triggerPop("Bunny"); }
  } 
  else if (itemX > width * 0.65) {
    if (currentItem === "milkshake") { score++; kittySize += 35; spawnItem(); }
    else { triggerPop("Kitty"); }
  } 
  else { 
    itemX = width / 2; itemY = startY; 
  }

  if (bunnySize > 450 || kittySize > 450) triggerPop(bunnySize > 450 ? "Bunny" : "Kitty");
  return false;
}

function mousePressed() { touchStarted(); }
function mouseReleased() { touchEnded(); }

function spawnItem() {
  itemX = width / 2;
  itemY = startY;
  currentItem = random(["pancake", "milkshake"]);
}

function triggerPop(who) {
  gameState = "POP";
  let col = (who === "Bunny") ? "#f4d03f" : "#ffb6c1";
  let px = (who === "Bunny") ? width * 0.2 : width * 0.8;
  for (let i = 0; i < 80; i++) particles.push(new Particle(px, startY, col));
}

function displayExplosion() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].display();
    if (particles[i].size < 0.1) particles.splice(i, 1);
  }
  fill(255, 50, 50); textAlign(CENTER); textSize(width * 0.15);
  text("BOOM!", width / 2, height / 2);
  fill("#6d4c41"); textSize(20);
  text("Final Score: " + score + "\nTap to restart", width/2, height/2 + 80);
}

function resetGame() {
  score = 0; bunnySize = 120; kittySize = 120; particles = [];
  gameState = "PLAY"; spawnItem();
}

/** * ROTATION FIX: 
 * Ensures item stays centered when rotating screen
 */
function windowResized() { 
  resizeCanvas(windowWidth, windowHeight); 
  startY = height * 0.6; 
  
  // If we aren't dragging, reposition the item to the new center
  if (!isDragging) {
    itemX = width / 2;
    itemY = startY;
  }
}

class Particle {
  constructor(x, y, col) {
    this.x = x; this.y = y; this.col = col;
    this.vx = random(-15, 15); this.vy = random(-20, 5);
    this.gravity = 0.6; this.size = random(10, 30);
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.size *= 0.96; }
  display() { fill(this.col); noStroke(); ellipse(this.x, this.y, this.size); }
}
</script>
</body>
</html>
