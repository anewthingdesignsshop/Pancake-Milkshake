<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pancake Milkshake</title>
    
    <link rel="apple-touch-icon" href="https://i.imgur.com/uRovA7G.png"> 

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #fdf5e6; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let score = 0, itemX, itemY, startY;
let currentItem = "", isDragging = false;
let bunnySize = 130, kittySize = 130;
let gameState = "PLAY", particles = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  startY = height * 0.6;
  spawnItem();
}

function draw() {
  background("#fdf5e6");
  
  // Table
  noStroke(); fill("#e0c9a6"); rect(0, startY + 45, width, height - startY);
  stroke("#d7ccc8"); strokeWeight(4); line(0, startY + 45, width, startY + 45);

  if (gameState === "PLAY") {
    displayGame();
  } else {
    displayExplosion();
  }
}

function displayGame() {
  fill("#6d4c41"); noStroke(); textAlign(CENTER); textSize(width * 0.12);
  text(score, width / 2, height * 0.15);

  if (isDragging) { itemX = mouseX; itemY = mouseY; }

  // Draw Bunny
  drawChibiBunny(width * 0.22, startY, bunnySize, (isDragging && itemX < width * 0.45));

  // Draw Kitty (Updated to match your image)
  drawChibiKitty(width * 0.78, startY, kittySize, (isDragging && itemX > width * 0.55));

  drawFood(itemX, itemY, currentItem);
}

function drawChibiBunny(x, y, s, isOpen) {
  push();
  if (s > 320) translate(random(-2, 2), random(-2, 2));
  translate(x, y);
  fill(255); stroke(100, 50, 50); strokeWeight(3);
  ellipse(-s/4, -s/1.5, s/3.5, s/1.2); ellipse(s/4, -s/1.5, s/3.5, s/1.2); // Ears
  ellipse(0, 0, s, s * 1.1); // Body
  
  let dx = map(itemX, 0, width, -s/20, s/20);
  let dy = map(itemY, 0, height, -s/30, s/30);
  fill(40); noStroke(); ellipse(-s/4 + dx, -s/10 + dy, s/9, s/7); ellipse(s/4 + dx, -s/10 + dy, s/9, s/7);
  
  if (isOpen) { fill(80, 40, 40); stroke(0); ellipse(0, s/6, s/3.5, s/2.5); }
  else { noFill(); stroke(100, 50, 50); arc(0, s/8, s/5, s/10, 0, PI); }
  pop();
}

function drawChibiKitty(x, y, s, isOpen) {
  push();
  if (s > 320) translate(random(-2, 2), random(-2, 2));
  translate(x, y);
  
  // Body (Grey with stripes)
  stroke(80); strokeWeight(3); fill(220);
  ellipse(0, 0, s * 1.1, s);
  
  // Stripes (Darker grey)
  fill(100); noStroke();
  rect(-s/10, -s/2, s/5, s/6, 5); // Center stripe
  rect(-s/3, -s/2.5, s/6, s/8, 5); // Left stripe
  rect(s/6, -s/2.5, s/6, s/8, 5); // Right stripe

  // Ears
  stroke(80); fill(220);
  triangle(-s/2.2, -s/3, -s/3, -s/1.8, -s/6, -s/3);
  triangle(s/2.2, -s/3, s/3, -s/1.8, s/6, -s/3);
  fill(255, 192, 203); noStroke(); // Pink inner ear
  triangle(-s/2.5, -s/3.2, -s/3, -s/2.1, -s/5, -s/3.2);
  triangle(s/2.5, -s/3.2, s/3, -s/2.1, s/5, -s/3.2);

  // Bib (Yellow with milk carton)
  fill(255, 235, 150); stroke(80);
  arc(0, s/4, s/1.8, s/2, 0, PI);
  fill(255); rect(-s/20, s/3, s/10, s/8); // Milk carton bib icon

  // Face
  let dx = map(itemX, 0, width, -s/20, s/20);
  let dy = map(itemY, 0, height, -s/30, s/30);
  fill(40); noStroke();
  ellipse(-s/4 + dx, 0 + dy, s/9, s/7); ellipse(s/4 + dx, 0 + dy, s/9, s/7);
  
  if (isOpen) { fill(80, 40, 40); stroke(0); ellipse(0, s/6, s/2.5, s/3.5); }
  else { stroke(80); line(-s/10, s/8, s/10, s/8); }
  pop();
}

function drawFood(x, y, type) {
  push(); translate(x, y);
  if (type === "pancake") {
    fill(245); noStroke(); ellipse(0, 15, 85, 25); // Plate
    fill("#f4d03f"); stroke("#b8860b");
    for(let i=0; i<3; i++) ellipse(0, i*5, 70, 22);
    fill("#d35400"); noStroke(); ellipse(0, -5, 45, 12); // Syrup
    fill("#ffeb3b"); stroke("#ffd700"); rect(-8, -18, 16, 10, 2); // Butter
  } else {
    fill(255, 255, 255, 200); stroke(255); rect(-20, -40, 40, 75, 5); // Glass
    noStroke(); fill("#ffb6c1"); rect(-17, -35, 34, 65, 3); // Shake
    fill(255); ellipse(0, -40, 45, 25); // Foam
    fill("#e74c3c"); ellipse(0, -55, 14, 14); // Cherry
    stroke("#e74c3c"); strokeWeight(4); line(8, -40, 15, -65); // Straw
  }
  pop();
}

function touchStarted() {
  if (gameState === "POP") { resetGame(); return false; }
  if (dist(mouseX, mouseY, itemX, itemY) < 100) isDragging = true;
  return false;
}

function touchEnded() {
  if (!isDragging) return false;
  isDragging = false;
  if (itemX < width * 0.35) {
    if (currentItem === "pancake") { score++; bunnySize += 30; spawnItem(); }
    else { triggerPop("Bunny"); }
  } else if (itemX > width * 0.65) {
    if (currentItem === "milkshake") { score++; kittySize += 30; spawnItem(); }
    else { triggerPop("Kitty"); }
  } else { itemX = width / 2; itemY = startY; }
  if (bunnySize > 480 || kittySize > 480) triggerPop(bunnySize > 480 ? "Bunny" : "Kitty");
  return false;
}

function triggerPop(who) {
  gameState = "POP";
  let col = (who === "Bunny") ? "#f4d03f" : "#ffb6c1";
  let px = (who === "Bunny") ? width * 0.22 : width * 0.78;
  for (let i = 0; i < 80; i++) particles.push(new Particle(px, startY, col));
}

function displayExplosion() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(); particles[i].display();
    if (particles[i].size < 0.1) particles.splice(i, 1);
  }
  fill(255, 50, 50); textAlign(CENTER); textSize(width * 0.15); text("BOOM!", width / 2, height / 2);
  fill("#6d4c41"); textSize(22); text("Score: " + score + "\nTap to restart", width/2, height/2 + 90);
}

function spawnItem() { itemX = width / 2; itemY = startY; currentItem = random(["pancake", "milkshake"]); }
function resetGame() { score = 0; bunnySize = 130; kittySize = 130; particles = []; gameState = "PLAY"; spawnItem(); }
function windowResized() { resizeCanvas(windowWidth, windowHeight); startY = height * 0.6; }
function mousePressed() { touchStarted(); }
function mouseReleased() { touchEnded(); }

class Particle {
  constructor(x, y, col) {
    this.x = x; this.y = y; this.col = col;
    this.vx = random(-18, 18); this.vy = random(-22, 5);
    this.gravity = 0.6; this.size = random(10, 35);
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.size *= 0.95; }
  display() { fill(this.col); noStroke(); ellipse(this.x, this.y, this.size); }
}
</script>
</body>
</html>
