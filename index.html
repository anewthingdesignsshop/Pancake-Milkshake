<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pancake Milkshake</title>
    
    <link rel="apple-touch-icon" href="https://i.imgur.com/uRovA7G.png"> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: linear-gradient(180deg, #FFF0D3 0%, #FADCA6 100%); /* Exact image background match */
            touch-action: none;
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        /* Glossy Floating Score Header */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(40px + env(safe-area-inset-top)) 20px 20px 20px;
            z-index: 10;
        }

        .score-container {
            align-self: center;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 60px;
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6), 0 10px 25px rgba(74, 46, 43, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: scale(1);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
            position: relative;
            overflow: hidden;
        }

        /* Subtle gloss highlight across the scoreboard */
        .score-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: rgba(255,255,255,0.3);
            pointer-events: none;
        }

        .score-container.bump {
            transform: scale(1.15);
        }

        #score-display {
            font-size: 34px;
            color: #4A2E2B; /* Deep warm brown text */
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        /* Whimsical Overlay Screens */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 211, 0.85); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-card {
            background: #FFFFFF;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(74, 46, 43, 0.15);
            text-align: center;
            border: 4px solid #4A2E2B;
            max-width: 90%;
            width: 340px;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.active .overlay-card {
            transform: translateY(0);
        }

        .overlay h1 {
            color: #E29A86;
            font-size: 44px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        .overlay p {
            color: #4A2E2B;
            font-size: 18px;
            margin: 0 0 30px 0;
            font-weight: 600;
        }

        .btn-restart {
            background: #E29A86;
            color: #FFFFFF;
            border: 3px solid #4A2E2B;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 0px #4A2E2B;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            pointer-events: auto;
        }

        .btn-restart:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #4A2E2B;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="score-container" id="score-box">
            <div id="score-display">SCORE: 0</div>
        </div>
    </div>

    <div id="gameover-screen" class="overlay">
        <div class="overlay-card">
            <h1>BOOM!</h1>
            <p id="final-score-text">Final Score: 0</p>
            <button class="btn-restart" id="restart-button">Play Again</button>
        </div>
    </div>

<script>
let score = 0;
let itemX, itemY, startY;
let currentItem = "";
let isDragging = false;
let bunnySize = 120;
let kittySize = 120;
let gameState = "PLAY"; 
let particles = [];

// DOM Reference Elements
let scoreDisplay, scoreBox, gameoverScreen, finalScoreText, restartButton;

function setup() {
  createCanvas(windowWidth, windowHeight);
  startY = height * 0.68; // Anchors characters beautifully low on screen
  
  scoreDisplay = document.getElementById('score-display');
  scoreBox = document.getElementById('score-box');
  gameoverScreen = document.getElementById('gameover-screen');
  finalScoreText = document.getElementById('final-score-text');
  
  // Clean event bindings to resolve the 'Play Again' action layer blocking bug
  restartButton = document.getElementById('restart-button');
  restartButton.addEventListener('click', resetGame);
  restartButton.addEventListener('touchend', function(e) {
    e.preventDefault();
    resetGame();
  });
  
  spawnItem();
}

function draw() {
  clear(); // Ensures canvas background remains clear to show the CSS gradient smoothly

  if (gameState === "PLAY") {
    displayGame();
  } else {
    displayExplosion();
  }
}

function displayGame() {
  if (isDragging) {
    itemX = mouseX;
    itemY = mouseY;
  }

  let bunnyHungry = (isDragging && itemX < width * 0.42);
  let kittyHungry = (isDragging && itemX > width * 0.58);

  // Render Left & Right Characters
  drawChibiBunny(width * 0.22, startY, bunnySize, bunnyHungry);
  drawChibiKitty(width * 0.78, startY, kittySize, kittyHungry);

  // Active Center Sorting Food Entity
  drawFood(itemX, itemY, currentItem, true);
}

// --- ULTRA-CHIBI ILLUSTRATION RENDERING ENGINE ---

function drawChibiBunny(x, y, s, isOpen) {
  push();
  if (s > 300) translate(random(-1.5, 1.5), random(-1.5, 1.5)); 
  translate(x, y);
  
  stroke("#4A2E2B"); strokeWeight(4); fill("#FFFDF9");
  
  // Bunny ears
  ellipse(-s/4, -s/1.5, s/3.8, s/1.1);
  ellipse(s/4, -s/1.5, s/3.8, s/1.1);
  
  // Ear inners pink
  fill("#FBCBC9"); noStroke();
  ellipse(-s/4, -s/1.5, s/8, s/1.3);
  ellipse(s/4, -s/1.5, s/8, s/1.3);
  
  // Body Round
  stroke("#4A2E2B"); strokeWeight(4); fill("#FFFDF9");
  ellipse(0, 0, s, s * 0.95);
  
  // Paws
  ellipse(-s/4, s/3, s/4, s/5);
  ellipse(s/4, s/3, s/4, s/5);
  
  let dx = map(itemX, 0, width, -s/22, s/22);
  let dy = map(itemY, 0, height, -s/32, s/32);
  
  // Premium Sparkle Eyes
  fill("#3A2523"); noStroke();
  ellipse(-s/4 + dx, -s/20 + dy, s/7, s/7);
  ellipse(s/4 + dx, -s/20 + dy, s/7, s/7);
  fill(255);
  ellipse(-s/3.6 + dx, -s/16 + dy, s/18, s/18); // Sparkle 1
  ellipse(s/3.6 + dx, -s/16 + dy, s/18, s/18);
  ellipse(-s/4.5 + dx, -s/26 + dy, s/35, s/35); // Sparkle 2
  ellipse(s/4.5 + dx, -s/26 + dy, s/35, s/35);
  
  // Soft blushing cheeks
  fill("rgba(240, 166, 155, 0.5)");
  ellipse(-s/3.2, s/12, s/4, s/9);
  ellipse(s/3.2, s/12, s/4, s/9);
  
  // Mouth
  if (isOpen) {
    fill("#6C504B"); stroke("#4A2E2B"); strokeWeight(3);
    ellipse(0, s/12, s/5, s/4);
  } else {
    noFill(); stroke("#4A2E2B"); strokeWeight(3);
    arc(-s/30, s/12, s/12, s/12, 0, PI);
    arc(s/30, s/12, s/12, s/12, 0, PI);
  }
  
  // Static Decorative Character Plate
  drawFoodPlate(0, s/2.6, s * 0.9);
  pop();
}

function drawChibiKitty(x, y, s, isOpen) {
  push();
  if (s > 300) translate(random(-1.5, 1.5), random(-1.5, 1.5));
  translate(x, y);
  
  stroke("#4A2E2B"); strokeWeight(4); fill("#FFFDF9");
  
  // Tail
  stroke("#4A2E2B"); fill("#EAA86E");
  rect(s/2.5, 0, s/5, s/2, 10);
  
  // Kitty Ears
  fill("#EAA86E"); stroke("#4A2E2B");
  triangle(-s/2, -s/6, -s/2.4, -s/1.6, -s/6, -s/6);
  fill("#FFFDF9");
  triangle(s/2, -s/6, s/2.4, -s/1.6, s/6, -s/6);
  
  // Ear Inners Pink
  fill("#FBCBC9"); noStroke();
  triangle(-s/2.2, -s/5, -s/2.4, -s/1.5, -s/5, -s/5);
  triangle(s/2.2, -s/5, s/2.4, -s/1.5, s/5, -s/5);
  
  // Body squat
  stroke("#4A2E2B"); strokeWeight(4); fill("#FFFDF9");
  ellipse(0, 0, s * 1.05, s * 0.9);
  
  // Ginger Patch Top Corner
  fill("#EAA86E"); noStroke();
  arc(s/4, -s/4, s/2, s/2, HALF_PI, PI + HALF_PI);
  
  // Paws
  stroke("#4A2E2B"); fill("#FFFDF9");
  ellipse(-s/4, s/3.2, s/4, s/5);
  ellipse(s/4, s/3.2, s/4, s/5);
  
  let dx = map(itemX, 0, width, -s/22, s/22);
  let dy = map(itemY, 0, height, -s/32, s/32);
  
  // Eyes with Multi-Sparkle Look
  fill("#3A2523"); noStroke();
  ellipse(-s/4 + dx, -s/20 + dy, s/7, s/7);
  ellipse(s/4 + dx, -s/20 + dy, s/7, s/7);
  fill(255);
  ellipse(-s/3.6 + dx, -s/16 + dy, s/18, s/18);
  ellipse(s/3.6 + dx, -s/16 + dy, s/18, s/18);
  ellipse(-s/4.5 + dx, -s/26 + dy, s/35, s/35);
  ellipse(s/4.5 + dx, -s/26 + dy, s/35, s/35);
  
  // Soft cheeks
  fill("rgba(240, 166, 155, 0.5)");
  ellipse(-s/3, s/10, s/4, s/9);
  ellipse(s/3, s/10, s/4, s/9);
  
  // Mouth
  if (isOpen) {
    fill("#6C504B"); stroke("#4A2E2B"); strokeWeight(3);
    ellipse(0, s/10, s/4, s/5);
  } else {
    noFill(); stroke("#4A2E2B"); strokeWeight(3);
    arc(-s/30, s/10, s/12, s/12, 0, PI);
    arc(s/30, s/10, s/12, s/12, 0, PI);
  }
  
  // Static Decorative Character Plate
  drawFoodPlate(0, s/2.6, s * 0.9);
  pop();
}

function drawFoodPlate(mx, my, pw) {
  push();
  translate(mx, my);
  stroke("#4A2E2B"); strokeWeight(3); fill("#F5F0EA");
  ellipse(0, 0, pw, pw * 0.28); // Outer plate edge rim
  fill("#EBE4DC"); noStroke();
  ellipse(0, 0, pw * 0.85, pw * 0.22); // Inner circle plate rim recess
  pop();
}

function drawFood(x, y, type, hasPlate) {
  push();
  translate(x, y);
  stroke("#4A2E2B"); strokeWeight(3.5);
  
  if (type === "pancake") {
    if(hasPlate) drawFoodPlate(0, 15, 95);
    
    // Smooth stack pancakes layers
    stroke("#4A2E2B"); fill("#F6D57F");
    for(let i=0; i<3; i++) ellipse(0, i*4.5, 76, 24);
    
    // Rich illustration syrup puddle profile
    fill("#E4985E"); noStroke(); 
    ellipse(0, -3, 54, 15);
    // Drips hanging off profile edge
    stroke("#4A2E2B"); fill("#E4985E"); strokeWeight(3);
    rect(-20, -3, 8, 12, 4);
    rect(12, -3, 6, 10, 3);
    
    // Butter cuboid pad
    fill("#FFF199"); stroke("#4A2E2B"); strokeWeight(3); 
    rect(-10, -16, 20, 12, 3);
  } else {
    if(hasPlate) drawFoodPlate(0, 15, 95);
    
    // Glass structure container
    fill("rgba(255, 255, 255, 0.45)"); rect(-20, -38, 40, 68, 8);
    
    // Strawberry core wash fill
    noStroke(); fill("#FBC3C3"); rect(-17, -34, 34, 58, 5);
    
    // Swirled dense whipped cream froth profiles
    fill("#FFFDF9"); stroke("#4A2E2B"); strokeWeight(3);
    ellipse(0, -38, 42, 18);
    ellipse(0, -47, 26, 14);
    
    // Vibrant cherry garnish
    fill("#E27D73"); stroke("#4A2E2B"); strokeWeight(2.5);
    ellipse(-2, -54, 14, 14);
    noFill(); stroke("#4A2E2B"); strokeWeight(2);
    arc(4, -62, 12, 10, PI, TWO_PI - HALF_PI); // Cherry stalk stem
    
    // Straw line profile
    stroke("#E27D73"); strokeWeight(4); line(10, -38, 18, -58);
  }
  pop();
}

// --- ENGINE SYSTEM LOGIC LAYER ---

function touchStarted() {
  if (gameState !== "PLAY") return false;
  if (dist(mouseX, mouseY, itemX, itemY) < 100) isDragging = true;
  return false;
}

function touchEnded() {
  if (!isDragging) return false;
  isDragging = false;

  if (itemX < width * 0.35) {
    if (currentItem === "pancake") { updateScore(); bunnySize += 25; spawnItem(); }
    else { triggerPop("Bunny"); }
  } 
  else if (itemX > width * 0.65) {
    if (currentItem === "milkshake") { updateScore(); kittySize += 25; spawnItem(); }
    else { triggerPop("Kitty"); }
  } 
  else { 
    itemX = width / 2; itemY = startY; 
  }

  if (bunnySize > 400 || kittySize > 400) triggerPop(bunnySize > 400 ? "Bunny" : "Kitty");
  return false;
}

function mousePressed() { touchStarted(); }
function mouseReleased() { touchEnded(); }

function spawnItem() {
  itemX = width / 2;
  itemY = startY;
  currentItem = random(["pancake", "milkshake"]);
}

function updateScore() {
  score++;
  scoreDisplay.innerText = "SCORE: " + score;
  
  scoreBox.classList.add('bump');
  setTimeout(() => scoreBox.classList.remove('bump'), 120);
}

function triggerPop(who) {
  gameState = "POP";
  isDragging = false;
  
  let col = (who === "Bunny") ? "#F6D57F" : "#FBC3C3";
  let px = (who === "Bunny") ? width * 0.22 : width * 0.78;
  
  for (let i = 0; i < 90; i++) particles.push(new Particle(px, startY, col));
  
  finalScoreText.innerText = "Final Score: " + score;
  gameoverScreen.classList.add('active');
}

function displayExplosion() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].display();
    if (particles[i].size < 0.1) particles.splice(i, 1);
  }
}

function resetGame() {
  score = 0;
  scoreDisplay.innerText = "SCORE: 0";
  bunnySize = 120;
  kittySize = 120;
  particles = [];
  gameoverScreen.classList.remove('active');
  gameState = "PLAY"; 
  spawnItem();
}

function windowResized() { 
  resizeCanvas(windowWidth, windowHeight); 
  startY = height * 0.68; 
  
  if (!isDragging) {
    itemX = width / 2;
    itemY = startY;
  }
}

class Particle {
  constructor(x, y, col) {
    this.x = x; this.y = y; this.col = col;
    this.vx = random(-14, 14); this.vy = random(-20, 3);
    this.gravity = 0.55; this.size = random(10, 32);
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.size *= 0.95; }
  display() { fill(this.col); stroke("#4A2E2B"); strokeWeight(2.5); ellipse(this.x, this.y, this.size); }
}
</script>
</body>
</html>
