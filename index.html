<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pancake Milkshake</title>
    
    <link rel="apple-touch-icon" href="https://i.imgur.com/uRovA7G.png"> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #FFF1D6; 
            touch-action: none;
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        /* HUD Header */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(40px + env(safe-area-inset-top)) 20px 20px 20px;
            z-index: 10;
        }

        .score-container {
            align-self: center;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 60px;
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6), 0 10px 25px rgba(74, 46, 43, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: scale(1);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
            position: relative;
            overflow: hidden;
        }

        .score-container.bump {
            transform: scale(1.15);
        }

        #score-display {
            font-size: 34px;
            color: #4A2E2B; 
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 241, 214, 0.85); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-card {
            background: #FFFFFF;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(74, 46, 43, 0.15);
            text-align: center;
            border: 4px solid #4A2E2B;
            max-width: 90%;
            width: 340px;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.active .overlay-card {
            transform: translateY(0);
        }

        .overlay h1 {
            color: #E29A86;
            font-size: 44px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        .overlay p {
            color: #4A2E2B;
            font-size: 18px;
            margin: 0 0 30px 0;
            font-weight: 600;
        }

        .btn-restart {
            background: #E29A86;
            color: #FFFFFF;
            border: 3px solid #4A2E2B;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 0px #4A2E2B;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            pointer-events: auto;
        }

        .btn-restart:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #4A2E2B;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="score-container" id="score-box">
            <div id="score-display">SCORE: 0</div>
        </div>
    </div>

    <div id="gameover-screen" class="overlay">
        <div class="overlay-card">
            <h1>BOOM!</h1>
            <p id="final-score-text">Final Score: 0</p>
            <button class="btn-restart" id="restart-button">Play Again</button>
        </div>
    </div>

<script>
let score = 0;
let itemX, itemY, startY;
let currentItem = "";
let isDragging = false;
let bunnySize = 135;
let kittySize = 135;
let gameState = "PLAY"; 
let particles = [];

// Dynamic position coordinates tracking for accurate drop zoning
let bunnyX, kittyX;

let scoreDisplay, scoreBox, gameoverScreen, finalScoreText, restartButton;

function setup() {
  createCanvas(windowWidth, windowHeight);
  updateLayout();
  
  scoreDisplay = document.getElementById('score-display');
  scoreBox = document.getElementById('score-box');
  gameoverScreen = document.getElementById('gameover-screen');
  finalScoreText = document.getElementById('final-score-text');
  
  restartButton = document.getElementById('restart-button');
  restartButton.addEventListener('click', resetGame);
  restartButton.addEventListener('touchend', function(e) {
    e.preventDefault();
    resetGame();
  });
  
  spawnItem();
}

function updateLayout() {
  startY = height * 0.70;
  bunnyX = width * 0.22;
  kittyX = width * 0.78;
}

function draw() {
  clear(); 

  if (gameState === "PLAY") {
    displayGame();
  } else {
    displayExplosion();
  }
}

function displayGame() {
  if (isDragging) {
    itemX = mouseX;
    itemY = mouseY;
  }

  // Proximity tracking replaces arbitrary screen splits
  let bunnyHungry = (isDragging && dist(itemX, itemY, bunnyX, startY) < 180);
  let kittyHungry = (isDragging && dist(itemX, itemY, kittyX, startY) < 180);

  // Characters
  drawChibiBunny(bunnyX, startY, bunnySize, bunnyHungry);
  drawChibiKitty(kittyX, startY, kittySize, kittyHungry);

  // Active Sorting Food Object
  drawFood(itemX, itemY, currentItem, true);
}

// --- CURVED CHIBI FORM RENDERING ENGINE ---

function drawChibiBunny(x, y, s, isOpen) {
  push();
  if (s > 300) translate(random(-1.5, 1.5), random(-1.5, 1.5)); 
  translate(x, y);
  
  stroke("#4A2E2B"); strokeWeight(4.5); strokeJoin(ROUND); fill("#FFFDF9");
  
  ellipse(-s*0.22, -s*0.52, s*0.16, s*0.58);
  ellipse(s*0.22, -s*0.52, s*0.16, s*0.58);
  
  fill("#FCD2D1"); noStroke();
  ellipse(-s*0.22, -s*0.52, s*0.08, s*0.48);
  ellipse(s*0.22, -s*0.52, s*0.08, s*0.48);
  
  stroke("#4A2E2B"); strokeWeight(4.5); fill("#FFFDF9");
  beginShape();
  vertex(0, -s*0.25);
  bezierVertex(s*0.32, -s*0.25, s*0.46, -s*0.08, s*0.46, s*0.06);   
  bezierVertex(s*0.46, s*0.24, s*0.26, s*0.32, 0, s*0.32);         
  bezierVertex(-s*0.26, s*0.32, -s*0.46, s*0.24, -s*0.46, s*0.06); 
  bezierVertex(-s*0.46, -s*0.08, -s*0.32, -s*0.25, 0, -s*0.25);   
  endShape(CLOSE);
  
  ellipse(-s*0.08, s*0.18, s*0.07, s*0.09);
  ellipse(s*0.08, s*0.18, s*0.07, s*0.09);

  let dx = map(itemX, 0, width, -s/24, s/24);
  let dy = map(itemY, 0, height, -s/32, s/32);
  
  fill("#3A2523"); noStroke();
  ellipse(-s*0.20 + dx, s*0.04 + dy, s*0.13, s*0.13);
  ellipse(s*0.20 + dx, s*0.04 + dy, s*0.13, s*0.13);
  
  fill(255);
  ellipse(-s*0.22 + dx, s*0.01 + dy, s*0.045, s*0.045); 
  ellipse(s*0.18 + dx, s*0.01 + dy, s*0.045, s*0.045);
  ellipse(-s*0.16 + dx, s*0.06 + dy, s*0.02, s*0.02); 
  ellipse(s*0.24 + dx, s*0.06 + dy, s*0.02, s*0.02);
  
  fill("rgba(242, 172, 162, 0.55)");
  ellipse(-s*0.32, s*0.11, s*0.16, s*0.08);
  ellipse(s*0.32, s*0.11, s*0.16, s*0.08);
  
  stroke("#4A2E2B"); strokeWeight(3.5); noFill();
  if (isOpen) {
    fill("#6C504B");
    ellipse(0, s*0.08, s*0.12, s*0.12);
  } else {
    arc(-s*0.03, s*0.06, s*0.06, s*0.06, 0, PI);
    arc(s*0.03, s*0.06, s*0.06, s*0.06, 0, PI);
  }
  
  drawFoodPlate(0, s*0.25, s * 0.95);
  pop();
}

function drawChibiKitty(x, y, s, isOpen) {
  push();
  if (s > 300) translate(random(-1.5, 1.5), random(-1.5, 1.5));
  translate(x, y);
  
  stroke("#4A2E2B"); strokeWeight(4.5); strokeJoin(ROUND); fill("#FFFDF9");
  
  beginShape();
  vertex(s*0.35, s*0.1);
  bezierVertex(s*0.55, s*0.15, s*0.65, -s*0.15, s*0.55, -s*0.15);
  bezierVertex(s*0.48, -s*0.15, s*0.45, s*0.05, s*0.35, s*0.2);
  endShape(CLOSE);
  
  fill("#D08D5B"); stroke("#4A2E2B");
  rect(-s*0.42, -s*0.36, s*0.2, s*0.26, s*0.06);
  fill("#FFFDF9");
  rect(s*0.22, -s*0.36, s*0.2, s*0.26, s*0.06);
  
  fill("#FCD2D1"); noStroke();
  ellipse(-s*0.32, -s*0.22, s*0.1, s*0.16);
  ellipse(s*0.32, -s*0.22, s*0.1, s*0.16);
  
  stroke("#4A2E2B"); strokeWeight(4.5); fill("#FFFDF9");
  beginShape();
  vertex(0, -s*0.25);
  bezierVertex(s*0.32, -s*0.25, s*0.46, -s*0.08, s*0.46, s*0.06); 
  bezierVertex(s*0.46, s*0.24, s*0.26, s*0.32, 0, s*0.32);         
  bezierVertex(-s*0.26, s*0.32, -s*0.46, s*0.24, -s*0.46, s*0.06); 
  bezierVertex(-s*0.46, -s*0.08, -s*0.32, -s*0.25, 0, -s*0.25);   
  endShape(CLOSE);
  
  fill("#EAA86E"); noStroke();
  beginShape();
  vertex(-s*0.44, -s*0.05);
  bezierVertex(-s*0.36, -s*0.02, -s*0.28, s*0.08, -s*0.30, s*0.16);
  bezierVertex(-s*0.38, s*0.20, -s*0.46, s*0.12, -s*0.44, -s*0.05);
  endShape(CLOSE);
  
  beginShape();
  vertex(s*0.44, -s*0.05);
  bezierVertex(s*0.36, -s*0.02, s*0.28, s*0.08, s*0.30, s*0.16);
  bezierVertex(s*0.38, s*0.20, s*0.46, s*0.12, s*0.44, -s*0.05);
  endShape(CLOSE);

  let dx = map(itemX, 0, width, -s/22, s/22);
  let dy = map(itemY, 0, height, -s/32, s/32);
  
  fill("#3A2523"); noStroke();
  ellipse(-s*0.20 + dx, s*0.04 + dy, s*0.13, s*0.13);
  ellipse(s*0.20 + dx, s*0.04 + dy, s*0.13, s*0.13);
  
  fill(255);
  ellipse(-s*0.22 + dx, s*0.01 + dy, s*0.045, s*0.045); 
  ellipse(s*0.18 + dx, s*0.01 + dy, s*0.045, s*0.045);
  ellipse(-s*0.16 + dx, s*0.06 + dy, s*0.02, s*0.02); 
  ellipse(s*0.24 + dx, s*0.06 + dy, s*0.02, s*0.02);
  
  stroke("#4A2E2B"); strokeWeight(3);
  line(-s*0.44, s*0.06, -s*0.56, s*0.05);
  line(-s*0.44, s*0.12, -s*0.58, s*0.14);
  line(s*0.44, s*0.06, s*0.56, s*0.05);
  line(s*0.44, s*0.12, s*0.58, s*0.14);
  
  fill("rgba(242, 172, 162, 0.55)"); noStroke();
  ellipse(-s*0.32, s*0.11, s*0.16, s*0.08);
  ellipse(s*0.32, s*0.11, s*0.16, s*0.08);
  
  stroke("#4A2E2B"); strokeWeight(3.5); noFill();
  if (isOpen) {
    fill("#6C504B");
    ellipse(0, s*0.08, s*0.12, s*0.12);
  } else {
    arc(-s*0.03, s*0.06, s*0.06, s*0.06, 0, PI);
    arc(s*0.03, s*0.06, s*0.06, s*0.06, 0, PI);
  }
  
  drawFoodPlate(0, s*0.25, s * 0.95);
  pop();
}

function drawFoodPlate(mx, my, pw) {
  push();
  translate(mx, my);
  stroke("#4A2E2B"); strokeWeight(4.5); fill("#FFFDF9");
  ellipse(0, 0, pw, pw * 0.28); 
  fill("#ECE7E1"); noStroke();
  ellipse(0, 0, pw * 0.85, pw * 0.22); 
  stroke("#4A2E2B"); noFill(); strokeWeight(2);
  ellipse(0, 0, pw * 0.85, pw * 0.22); 
  pop();
}

function drawFood(x, y, type, hasPlate) {
  push();
  translate(x, y);
  stroke("#4A2E2B"); strokeWeight(4.5);
  
  if (type === "pancake") {
    if(hasPlate) drawFoodPlate(0, 15, 95);
    
    stroke("#4A2E2B"); fill("#F6D57F");
    for(let i=0; i<3; i++) ellipse(0, i*4.5, 76, 24);
    
    fill("#E4985E"); noStroke(); 
    ellipse(0, -3, 54, 15);
    stroke("#4A2E2B"); fill("#E4985E"); strokeWeight(3.5);
    rect(-20, -3, 8, 12, 4);
    rect(12, -3, 6, 10, 3);
    
    fill("#FFF199"); stroke("#4A2E2B"); strokeWeight(3.5); 
    rect(-10, -16, 20, 12, 3);
  } else {
    if(hasPlate) drawFoodPlate(0, 15, 95);
    
    fill("rgba(255, 255, 255, 0.5)"); rect(-20, -38, 40, 68, 8);
    noStroke(); fill("#FBC3C3"); rect(-17, -34, 34, 58, 5);
    
    fill("#FFFDF9"); stroke("#4A2E2B"); strokeWeight(3.5);
    ellipse(0, -38, 42, 18);
    ellipse(0, -47, 26, 14);
    
    fill("#E27D73"); stroke("#4A2E2B"); strokeWeight(2.5);
    ellipse(-2, -54, 14, 14);
    noFill(); stroke("#4A2E2B"); strokeWeight(2);
    arc(4, -62, 12, 10, PI, TWO_PI - HALF_PI); 
    
    stroke("#E27D73"); strokeWeight(4.5); line(10, -38, 18, -58);
  }
  pop();
}

// --- INTERACTIVE ENGINE LOGIC LAYER ---

function touchStarted() {
  if (gameState !== "PLAY") return false;
  if (dist(mouseX, mouseY, itemX, itemY) < 100) isDragging = true;
  return false;
}

function touchEnded() {
  if (!isDragging) return false;
  isDragging = false;

  // Precise coordinate distance checking prevents rotation drops
  let distanceToBunny = dist(itemX, itemY, bunnyX, startY);
  let distanceToKitty = dist(itemX, itemY, kittyX, startY);

  if (distanceToBunny < 130) {
    if (currentItem === "pancake") { updateScore(); bunnySize += 25; spawnItem(); }
    else { triggerPop("Bunny"); }
  } 
  else if (distanceToKitty < 130) {
    if (currentItem === "milkshake") { updateScore(); kittySize += 25; spawnItem(); }
    else { triggerPop("Kitty"); }
  } 
  else { 
    // Snaps cleanly back to center if let go outside feeding radius
    itemX = width / 2; itemY = startY; 
  }

  if (bunnySize > 400 || kittySize > 400) triggerPop(bunnySize > 400 ? "Bunny" : "Kitty");
  return false;
}

function mousePressed() { touchStarted(); }
function mouseReleased() { touchEnded(); }

function spawnItem() {
  itemX = width / 2;
  itemY = startY;
  currentItem = random(["pancake", "milkshake"]);
}

function updateScore() {
  score++;
  scoreDisplay.innerText = "SCORE: " + score;
  
  scoreBox.classList.add('bump');
  setTimeout(() => scoreBox.classList.remove('bump'), 120);
}

function triggerPop(who) {
  gameState = "POP";
  isDragging = false;
  
  let col = (who === "Bunny") ? "#F6D57F" : "#FBC3C3";
  let px = (who === "Bunny") ? bunnyX : kittyX;
  
  for (let i = 0; i < 90; i++) particles.push(new Particle(px, startY, col));
  
  finalScoreText.innerText = "Final Score: " + score;
  gameoverScreen.classList.add('active');
}

function displayExplosion() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].display();
    if (particles[i].size < 0.1) particles.splice(i, 1);
  }
}

function resetGame() {
  score = 0;
  scoreDisplay.innerText = "SCORE: 0";
  bunnySize = 120;
  kittySize = 120;
  particles = [];
  gameoverScreen.classList.remove('active');
  gameState = "PLAY"; 
  spawnItem();
}

function windowResized() { 
  resizeCanvas(windowWidth, windowHeight); 
  updateLayout();
  
  scoreDisplay.innerText = "SCORE: " + score;
  
  if (!isDragging) {
    itemX = width / 2;
    itemY = startY;
  }
}

class Particle {
  constructor(x, y, col) {
    this.x = x; this.y = y; this.col = col;
    this.vx = random(-14, 14); this.vy = random(-20, 3);
    this.gravity = 0.55; this.size = random(10, 32);
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.size *= 0.95; }
  display() { fill(this.col); stroke("#4A2E2B"); strokeWeight(2.5); ellipse(this.x, this.y, this.size); }
}
</script>
</body>
</html>
