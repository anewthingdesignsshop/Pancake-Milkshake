<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pancake Milkshake Sorting</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #fdf5e6; 
            touch-action: none; /* Prevents scrolling while playing */
        }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let score = 0;
let itemX, itemY;
let targetX, targetY;
let isDragging = false;
let currentItemType = "";
let bunnyScale = 1.0;
let kittyScale = 1.0;
let gameState = "PLAY";
let lerpSpeed = 0.2; // Smooth movement speed

function setup() {
  createCanvas(windowWidth, windowHeight);
  spawnItem();
}

function draw() {
  background("#fdf5e6");
  
  // Background Decorations (Simple Diner feel)
  noStroke();
  fill("#f5e6d3");
  rect(0, height * 0.7, width, height * 0.3); // Table/Floor
  
  // UI Score
  fill("#6d4c41");
  textAlign(CENTER, CENTER);
  textSize(min(width, height) * 0.08);
  textStyle(BOLD);
  text(score, width / 2, height * 0.1);

  if (gameState === "PLAY") {
    // Smoothly follow finger/mouse
    if (isDragging) {
      itemX = lerp(itemX, mouseX, lerpSpeed);
      itemY = lerp(itemY, mouseY, lerpSpeed);
    }

    // Render Characters with the updated Chibi style
    drawChibiBunny(width * 0.2, height * 0.65, bunnyScale);
    drawChibiKitty(width * 0.8, height * 0.65, kittyScale);
    
    // Draw Food
    drawFood(itemX, itemY, currentItemType);
    
  } else {
    drawGameOver();
  }
}

// --- MOBILE TOUCH CONTROLS ---

function touchStarted() {
  if (gameState === "GAMEOVER") {
    resetGame();
    return false;
  }
  if (dist(mouseX, mouseY, itemX, itemY) < 100) {
    isDragging = true;
  }
  return false;
}

function touchEnded() {
  if (!isDragging) return false;
  isDragging = false;

  // Sorting Logic
  if (itemX < width * 0.35) { // Left Side (Bunny)
    if (currentItemType === "pancake") {
      score++;
      bunnyScale += 0.08;
      spawnItem();
    } else {
      gameState = "GAMEOVER";
    }
  } else if (itemX > width * 0.65) { // Right Side (Kitty)
    if (currentItemType === "milkshake") {
      score++;
      kittyScale += 0.08;
      spawnItem();
    } else {
      gameState = "GAMEOVER";
    }
  } else {
    // Snap back to center
    itemX = width / 2;
    itemY = height / 2;
  }
  return false;
}

// Re-map mouse events to touch for desktop testing
function mousePressed() { touchStarted(); }
function mouseReleased() { touchEnded(); }

function spawnItem() {
  itemX = width / 2;
  itemY = height / 2;
  currentItemType = random(["pancake", "milkshake"]);
}

function resetGame() {
  score = 0;
  bunnyScale = 1.0;
  kittyScale = 1.0;
  gameState = "PLAY";
  spawnItem();
}

// --- CHIBI GRAPHICS (Code-based to match generated images) ---

function drawChibiBunny(x, y, s) {
  push();
  translate(x, y);
  scale(s * (width/1000)); // Responsive scaling
  
  // Ears
  fill(255); stroke(0); strokeWeight(2);
  ellipse(-25, -90, 30, 100); 
  ellipse(25, -90, 30, 100);
  fill("#ffc0cb"); noStroke();
  ellipse(-25, -90, 15, 70); 
  ellipse(25, -90, 15, 70);

  // Body
  fill(255); stroke(50); strokeWeight(3);
  ellipse(0, 0, 120, 140);
  
  // Face
  fill(50); // Beady eyes
  ellipse(-20, -10, 12, 15);
  ellipse(20, -10, 12, 15);
  fill("#ffc0cb"); noStroke(); // Cheeks
  ellipse(-40, 10, 20, 10);
  ellipse(40, 10, 20, 10);
  
  // Mouth
  noFill(); stroke(50); strokeWeight(2);
  arc(0, 5, 15, 10, 0, PI);
  pop();
}

function drawChibiKitty(x, y, s) {
  push();
  translate(x, y);
  scale(s * (width/1000));
  
  // Ears
  fill("#cccccc"); stroke(0); strokeWeight(2);
  triangle(-50, -40, -20, -60, -60, -20);
  triangle(50, -40, 20, -60, 60, -20);
  
  // Body
  fill("#eeeeee"); stroke(50); strokeWeight(3);
  ellipse(0, 0, 130, 110);
  
  // Stripes
  fill("#aaaaaa"); noStroke();
  rect(-15, -55, 30, 15, 5);
  
  // Face
  fill(50); // Beady eyes
  ellipse(-25, -5, 12, 15);
  ellipse(25, -5, 12, 15);
  fill("#ffc0cb"); // Cheeks
  ellipse(-45, 15, 20, 10);
  ellipse(45, 15, 20, 10);
  
  // Mouth
  stroke(50); noFill();
  line(-5, 10, 5, 10);
  pop();
}

function drawFood(x, y, type) {
  push();
  translate(x, y);
  let pulse = 1 + sin(frameCount * 0.1) * 0.05; // Gentle float effect
  scale(pulse * (width/800));
  
  if (type === "pancake") {
    // Modern Pancake Stack
    stroke(139, 69, 19); strokeWeight(2);
    fill("#f4d03f");
    for(let i=0; i<3; i++) ellipse(0, i*8, 80, 25);
    fill("#ffeb3b"); rect(-10, -15, 20, 15, 2); // Butter
  } else {
    // Strawberry Milkshake
    fill("#ffb6c1"); stroke(50); strokeWeight(2);
    rect(-20, -40, 40, 70, 5); // Glass
    fill(255); ellipse(0, -40, 40, 20); // Foam
    stroke("#ff0000"); strokeWeight(4);
    line(10, -40, 15, -65); // Straw
  }
  pop();
}

function drawGameOver() {
  fill("rgba(0,0,0,0.7)");
  rect(0, 0, width, height);
  fill(255);
  textSize(width * 0.1);
  text("OH NO!", width/2, height/2 - 20);
  textSize(width * 0.05);
  text("Tap to try again", width/2, height/2 + 60);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
