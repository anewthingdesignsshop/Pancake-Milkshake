<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pancake Milkshake</title>
    
    <link rel="apple-touch-icon" href="https://i.imgur.com/uRovA7G.png"> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: linear-gradient(180deg, #FFF0D3 0%, #FADCA6 100%); 
            touch-action: none;
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        /* Glossy Floating Score Header Layout */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(40px + env(safe-area-inset-top)) 20px 20px 20px;
            z-index: 10;
        }

        .score-container {
            align-self: center;
            background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.45) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 60px;
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6), 0 10px 25px rgba(74, 46, 43, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: scale(1);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
            position: relative;
            overflow: hidden;
        }

        .score-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: rgba(255,255,255,0.25);
            pointer-events: none;
        }

        .score-container.bump {
            transform: scale(1.15);
        }

        #score-display {
            font-size: 34px;
            color: #4A2E2B; 
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        /* End Game Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 211, 0.85); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-card {
            background: #FFFFFF;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(74, 46, 43, 0.15);
            text-align: center;
            border: 4px solid #4A2E2B;
            max-width: 90%;
            width: 340px;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.active .overlay-card {
            transform: translateY(0);
        }

        .overlay h1 {
            color: #E29A86;
            font-size: 44px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        .overlay p {
            color: #4A2E2B;
            font-size: 18px;
            margin: 0 0 30px 0;
            font-weight: 600;
        }

        .btn-restart {
            background: #E29A86;
            color: #FFFFFF;
            border: 3px solid #4A2E2B;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 0px #4A2E2B;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            pointer-events: auto;
        }

        .btn-restart:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #4A2E2B;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="score-container" id="score-box">
            <div id="score-display">SCORE: 0</div>
        </div>
    </div>

    <div id="gameover-screen" class="overlay">
        <div class="overlay-card">
            <h1>BOOM!</h1>
            <p id="final-score-text">Final Score: 0</p>
            <button class="btn-restart" id="restart-button">Play Again</button>
        </div>
    </div>

<script>
let score = 0;
let itemX, itemY, startY;
let currentItem = "";
let isDragging = false;
let bunnySize = 130;
let kittySize = 130;
let gameState = "PLAY"; 
let particles = [];

let scoreDisplay, scoreBox, gameoverScreen, finalScoreText, restartButton;

function setup() {
  createCanvas(windowWidth, windowHeight);
  startY = height * 0.70; 
  
  scoreDisplay = document.getElementById('score-display');
  scoreBox = document.getElementById('score-box');
  gameoverScreen = document.getElementById('gameover-screen');
  finalScoreText = document.getElementById('final-score-text');
  
  restartButton = document.getElementById('restart-button');
  restartButton.addEventListener('click', resetGame);
  restartButton.addEventListener('touchend', function(e) {
    e.preventDefault();
    resetGame();
  });
  
  spawnItem();
}

function draw() {
  clear(); 

  if (gameState === "PLAY") {
    displayGame();
  } else {
    displayExplosion();
  }
}

function displayGame() {
  if (isDragging) {
    itemX = mouseX;
    itemY = mouseY;
  }

  let bunnyHungry = (isDragging && itemX < width * 0.42);
  let kittyHungry = (isDragging && itemX > width * 0.58);

  // Render Sophisticated Vector Characters
  drawChibiBunny(width * 0.22, startY, bunnySize, bunnyHungry);
  drawChibiKitty(width * 0.78, startY, kittySize, kittyHungry);

  // Active Center Drag-and-Drop Food Asset
  drawFood(itemX, itemY, currentItem, true);
}

// --- SOPHISTICATED VECTOR BEZIER RENDERING ENGINE ---

function drawChibiBunny(x, y, s, isOpen) {
  push();
  if (s > 300) translate(random(-1.5, 1.5), random(-1.5, 1.5)); 
  translate(x, y);
  
  stroke("#4A2E2B"); strokeWeight(4); strokeJoin(ROUND); fill("#FFFDF9");
  
  // Left Ear Path Asymmetry
  beginShape();
  vertex(-s*0.3, -s*0.3);
  bezierVertex(-s*0.5, -s*1.2, -s*0.1, -s*1.3, -s*0.1, -s*0.4);
  bezierVertex(-s*0.1, -s*0.3, -s*0.2, -s*0.2, -s*0.3, -s*0.3);
  endShape(CLOSE);
  
  // Right Ear Path Asymmetry
  beginShape();
  vertex(s*0.1, -s*0.4);
  bezierVertex(s*0.1, -s*1.3, s*0.5, -s*1.2, s*0.3, -s*0.3);
  bezierVertex(s*0.2, -s*0.2, s*0.1, -s*0.3, s*0.1, -s*0.4);
  endShape(CLOSE);

  // Ear Inners Pink Base
  fill("#FBCBC9"); noStroke();
  beginShape();
  vertex(-s*0.26, -s*0.4);
  bezierVertex(-s*0.4, -s*1.1, -s*0.16, -s*1.1, -s*0.14, -s*0.4);
  endShape(CLOSE);
  
  beginShape();
  vertex(s*0.14, -s*0.4);
  bezierVertex(s*0.16, -s*1.1, s*0.4, -s*1.1, s*0.26, -s*0.4);
  endShape(CLOSE);
  
  // Sophisticated Chibi Head and Body contour map
  stroke("#4A2E2B"); strokeWeight(4); fill("#FFFDF9");
  beginShape();
  vertex(-s*0.4, s*0.2);
  bezierVertex(-s*0.6, -s*0.3, s*0.6, -s*0.3, s*0.4, s*0.2); // Cheeks curve profile
  bezierVertex(s*0.5, s*0.6, -s*0.5, s*0.6, -s*0.4, s*0.2); // Tapered base torso
  endShape(CLOSE);
  
  // Tucked In Paws Detail
  beginShape();
  vertex(-s*0.15, s*0.2);
  bezierVertex(-s*0.2, s*0.38, -s*0.05, s*0.38, 0, s*0.24);
  endShape();
  
  beginShape();
  vertex(s*0.15, s*0.2);
  bezierVertex(s*0.2, s*0.38, s*0.05, s*0.38, 0, s*0.24);
  endShape();

  // Left & Right Foot Pads
  ellipse(-s*0.35, s*0.42, s*0.2, s*0.14);
  ellipse(s*0.35, s*0.42, s*0.2, s*0.14);

  let dx = map(itemX, 0, width, -s/24, s/24);
  let dy = map(itemY, 0, height, -s/32, s/32);
  
  // Large Premium Sparkle Eyes
  fill("#3A2523"); noStroke();
  ellipse(-s*0.22 + dx, -s*0.02 + dy, s*0.14, s*0.14);
  ellipse(s*0.22 + dx, -s*0.02 + dy, s*0.14, s*0.14);
  fill(255);
  ellipse(-s*0.20 + dx, -s*0.05 + dy, s*0.05, s*0.05); 
  ellipse(s*0.24 + dx, -s*0.05 + dy, s*0.05, s*0.05);
  ellipse(-s*0.25 + dx, 0 + dy, s*0.025, s*0.025); 
  ellipse(s*0.19 + dx, 0 + dy, s*0.025, s*0.025);
  
  // Blush gradient
  fill("rgba(240, 166, 155, 0.45)");
  ellipse(-s*0.3, s*0.1, s*0.22, s*0.1);
  ellipse(s*0.3, s*0.1, s*0.22, s*0.1);
  
  // Mouth
  if (isOpen) {
    fill("#6C504B"); stroke("#4A2E2B"); strokeWeight(3);
    ellipse(0, s*0.1, s*0.18, s*0.16);
  } else {
    noFill(); stroke("#4A2E2B"); strokeWeight(3);
    arc(-s*0.04, s*0.08, s*0.08, s*0.08, 0, PI);
    arc(s*0.04, s*0.08, s*0.08, s*0.08, 0, PI);
  }
  
  drawFoodPlate(0, s*0.45, s * 1.1);
  pop();
}

function drawChibiKitty(x, y, s, isOpen) {
  push();
  if (s > 300) translate(random(-1.5, 1.5), random(-1.5, 1.5));
  translate(x, y);
  
  stroke("#4A2E2B"); strokeWeight(4); strokeJoin(ROUND); fill("#FFFDF9");
  
  // Elegant Curved Tail Base
  beginShape();
  vertex(s*0.35, s*0.2);
  bezierVertex(s*0.7, s*0.3, s*0.8, -s*0.2, s*0.65, -s*0.18);
  bezierVertex(s*0.72, -s*0.1, s*0.6, s*0.3, s*0.35, s*0.35);
  endShape(CLOSE);
  
  // Ginger Stripe details on tail tip
  fill("#EAA86E"); noStroke();
  ellipse(s*0.68, -s*0.16, s*0.08, s*0.08);
  
  // Sophisticated Chibi Kitty Ears
  stroke("#4A2E2B"); fill("#EAA86E");
  beginShape();
  vertex(-s*0.45, -s*0.05);
  bezierVertex(-s*0.5, -s*0.45, -s*0.25, -s*0.5, -s*0.18, -s*0.14);
  endShape(CLOSE);
  
  fill("#FFFDF9");
  beginShape();
  vertex(s*0.18, -s*0.14);
  bezierVertex(s*0.25, -s*0.5, s*0.5, -s*0.45, s*0.45, -s*0.05);
  endShape(CLOSE);
  
  // Ear Inners
  fill("#FBCBC9");
  beginShape();
  vertex(-s*0.4, -s*0.1); bezierVertex(-s*0.44, -s*0.38, -s*0.28, -s*0.38, -s*0.24, -s*0.14);
  endShape(CLOSE);
  beginShape();
  vertex(s*0.24, -s*0.14); bezierVertex(s*0.28, -s*0.38, s*0.44, -s*0.38, s*0.4, -s*0.1);
  endShape(CLOSE);
  
  // Main organic body/cheek layout
  stroke("#4A2E2B"); strokeWeight(4); fill("#FFFDF9");
  beginShape();
  vertex(-s*0.45, s*0.18);
  bezierVertex(-s*0.62, -s*0.25, s*0.62, -s*0.25, s*0.45, s*0.18);
  bezierVertex(s*0.5, s*0.55, -s*0.5, s*0.55, -s*0.45, s*0.18);
  endShape(CLOSE);
  
  // Beautiful Ginger Mask Overlay Patches (Left/Right Asymmetric feel)
  fill("#EAA86E"); noStroke();
  beginShape();
  vertex(-s*0.48, -s*0.05);
  bezierVertex(-s*0.4, -s*0.18, -s*0.2, -s*0.18, -s*0.15, -s*0.02);
  bezierVertex(-s*0.2, s*0.1, -s*0.4, s*0.08, -s*0.48, -s*0.05);
  endShape(CLOSE);

  beginShape();
  vertex(s*0.48, -s*0.05);
  bezierVertex(s*0.4, -s*0.18, s*0.2, -s*0.18, s*0.15, -s*0.02);
  bezierVertex(s*0.2, s*0.1, s*0.4, s*0.08, s*0.48, -s*0.05);
  endShape(CLOSE);
  
  // Paws mapping
  stroke("#4A2E2B"); fill("#FFFDF9");
  ellipse(-s*0.14, s*0.38, s*0.16, s*0.18);
  ellipse(s*0.14, s*0.38, s*0.16, s*0.18);
  
  let dx = map(itemX, 0, width, -s/22, s/22);
  let dy = map(itemY, 0, height, -s/32, s/32);
  
  // Expressive Chibi Eyes
  fill("#3A2523"); noStroke();
  ellipse(-s*0.22 + dx, -s*0.02 + dy, s*0.14, s*0.14);
  ellipse(s*0.22 + dx, -s*0.02 + dy, s*0.14, s*0.14);
  fill(255);
  ellipse(-s*0.20 + dx, -s*0.05 + dy, s*0.05, s*0.05); 
  ellipse(s*0.24 + dx, -s*0.05 + dy, s*0.05, s*0.05);
  ellipse(-s*0.25 + dx, 0 + dy, s*0.025, s*0.025); 
  ellipse(s*0.19 + dx, 0 + dy, s*0.025, s*0.025);
  
  // Delicate Whiskers lines
  stroke("#4A2E2B"); strokeWeight(2.5);
  line(-s*0.44, s*0.04, -s*0.56, s*0.02);
  line(-s*0.44, s*0.1, -s*0.58, s*0.12);
  line(s*0.44, s*0.04, s*0.56, s*0.02);
  line(s*0.44, s*0.1, s*0.58, s*0.12);
  
  // Delicate Blush
  fill("rgba(240, 166, 155, 0.45)"); noStroke();
  ellipse(-s*0.3, s*0.1, s*0.22, s*0.1);
  ellipse(s*0.3, s*0.1, s*0.22, s*0.1);
  
  // Mouth
  if (isOpen) {
    fill("#6C504B"); stroke("#4A2E2B"); strokeWeight(3);
    ellipse(0, s*0.1, s*0.22, s*0.15);
  } else {
    noFill(); stroke("#4A2E2B"); strokeWeight(3);
    arc(-s*0.04, s*0.08, s*0.08, s*0.08, 0, PI);
    arc(s*0.04, s*0.08, s*0.08, s*0.08, 0, PI);
  }
  
  drawFoodPlate(0, s*0.45, s * 1.1);
  pop();
}

function drawFoodPlate(mx, my, pw) {
  push();
  translate(mx, my);
  stroke("#4A2E2B"); strokeWeight(3.5); fill("#FFFDF9");
  ellipse(0, 0, pw, pw * 0.28); 
  fill("#EBE4DC"); noStroke();
  ellipse(0, 0, pw * 0.85, pw * 0.22); 
  stroke("#4A2E2B"); noFill(); strokeWeight(1.5);
  ellipse(0, 0, pw * 0.85, pw * 0.22); // Fine inner plate line asset rim
  pop();
}

function drawFood(x, y, type, hasPlate) {
  push();
  translate(x, y);
  stroke("#4A2E2B"); strokeWeight(3.5);
  
  if (type === "pancake") {
    if(hasPlate) drawFoodPlate(0, 15, 95);
    
    stroke("#4A2E2B"); fill("#F6D57F");
    for(let i=0; i<3; i++) ellipse(0, i*4.5, 76, 24);
    
    fill("#E4985E"); noStroke(); 
    ellipse(0, -3, 54, 15);
    stroke("#4A2E2B"); fill("#E4985E"); strokeWeight(3);
    rect(-20, -3, 8, 12, 4);
    rect(12, -3, 6, 10, 3);
    
    fill("#FFF199"); stroke("#4A2E2B"); strokeWeight(3); 
    rect(-10, -16, 20, 12, 3);
  } else {
    if(hasPlate) drawFoodPlate(0, 15, 95);
    
    fill("rgba(255, 255, 255, 0.45)"); rect(-20, -38, 40, 68, 8);
    noStroke(); fill("#FBC3C3"); rect(-17, -34, 34, 58, 5);
    
    fill("#FFFDF9"); stroke("#4A2E2B"); strokeWeight(3);
    ellipse(0, -38, 42, 18);
    ellipse(0, -47, 26, 14);
    
    fill("#E27D73"); stroke("#4A2E2B"); strokeWeight(2.5);
    ellipse(-2, -54, 14, 14);
    noFill(); stroke("#4A2E2B"); strokeWeight(2);
    arc(4, -62, 12, 10, PI, TWO_PI - HALF_PI); 
    
    stroke("#E27D73"); strokeWeight(4); line(10, -38, 18, -58);
  }
  pop();
}

// --- INTERACTIVE ENGINE LOGIC LAYER ---

function touchStarted() {
  if (gameState !== "PLAY") return false;
  if (dist(mouseX, mouseY, itemX, itemY) < 100) isDragging = true;
  return false;
}

function touchEnded() {
  if (!isDragging) return false;
  isDragging = false;

  if (itemX < width * 0.35) {
    if (currentItem === "pancake") { updateScore(); bunnySize += 25; spawnItem(); }
    else { triggerPop("Bunny"); }
  } 
  else if (itemX > width * 0.65) {
    if (currentItem === "milkshake") { updateScore(); kittySize += 25; spawnItem(); }
    else { triggerPop("Kitty"); }
  } 
  else { 
    itemX = width / 2; itemY = startY; 
  }

  if (bunnySize > 400 || kittySize > 400) triggerPop(bunnySize > 400 ? "Bunny" : "Kitty");
  return false;
}

function mousePressed() { touchStarted(); }
function mouseReleased() { touchEnded(); }

function spawnItem() {
  itemX = width / 2;
  itemY = startY;
  currentItem = random(["pancake", "milkshake"]);
}

function updateScore() {
  score++;
  scoreDisplay.innerText = "SCORE: " + score;
  
  scoreBox.classList.add('bump');
  setTimeout(() => scoreBox.classList.remove('bump'), 120);
}

function triggerPop(who) {
  gameState = "POP";
  isDragging = false;
  
  let col = (who === "Bunny") ? "#F6D57F" : "#FBC3C3";
  let px = (who === "Bunny") ? width * 0.22 : width * 0.78;
  
  for (let i = 0; i < 90; i++) particles.push(new Particle(px, startY, col));
  
  finalScoreText.innerText = "Final Score: " + score;
  gameoverScreen.classList.add('active');
}

function displayExplosion() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].display();
    if (particles[i].size < 0.1) particles.splice(i, 1);
  }
}

function resetGame() {
  score = 0;
  scoreDisplay.innerText = "SCORE: 0";
  bunnySize = 120;
  kittySize = 120;
  particles = [];
  gameoverScreen.classList.remove('active');
  gameState = "PLAY"; 
  spawnItem();
}

function windowResized() { 
  resizeCanvas(windowWidth, windowHeight); 
  startY = height * 0.70; 
  
  scoreDisplay.innerText = "SCORE: " + score;
  
  if (!isDragging) {
    itemX = width / 2;
    itemY = startY;
  }
}

class Particle {
  constructor(x, y, col) {
    this.x = x; this.y = y; this.col = col;
    this.vx = random(-14, 14); this.vy = random(-20, 3);
    this.gravity = 0.55; this.size = random(10, 32);
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.size *= 0.95; }
  display() { fill(this.col); stroke("#4A2E2B"); strokeWeight(2.5); ellipse(this.x, this.y, this.size); }
}
</script>
</body>
</html>
